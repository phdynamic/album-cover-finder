<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoverCrate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0b18;
      color: #ddd8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #16102e 0%, #1e1438 100%);
      border-bottom: 1px solid #3a2860;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #e8e0ff;
    }

    header .subtitle {
      font-size: 0.8rem;
      color: #9880c8;
      margin-top: 2px;
    }

    .source-toggles {
      display: flex;
      gap: 0.9rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .source-toggle {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: #b09ad8;
      cursor: pointer;
      user-select: none;
    }

    .source-toggle input[type="checkbox"] {
      accent-color: #a87fff;
      cursor: pointer;
    }

    .card-source {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-radius: 4px;
      padding: 1px 6px;
    }

    .card-source.src-musicbrainz { background: #1a2838; color: #7db8e8; }
    .card-source.src-itunes { background: #2a1838; color: #e87db8; }
    .card-source.src-deezer { background: #1a2820; color: #7de8a8; }

    .vinyl-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: conic-gradient(#4a2d7a 0deg, #2d1a50 120deg, #5a3890 240deg, #2d1a50 360deg);
      border: 3px solid #7b5ea7;
      position: relative;
      flex-shrink: 0;
    }

    .vinyl-icon::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #c0a8e8;
    }

    .search-panel {
      background: linear-gradient(135deg, #16102e 0%, #1a1238 100%);
      border-bottom: 1px solid #3a2860;
      padding: 1.5rem 2rem;
    }

    .search-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: flex-end;
      max-width: 900px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .field label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #b09ad8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field input {
      background: #0d0b1e;
      border: 1px solid #4a3470;
      border-radius: 6px;
      padding: 0.55rem 0.85rem;
      color: #ddd8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: #a87fff;
    }

    .field-query { flex: 1; min-width: 240px; }
    .field-query input { width: 100%; }

    .field-size input { width: 110px; }

    button[type="submit"] {
      background: linear-gradient(135deg, #7c4dff, #a855f7);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.4rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      align-self: flex-end;
    }

    button[type="submit"]:hover { opacity: 0.85; }
    button[type="submit"]:active { transform: scale(0.97); }
    button[type="submit"]:disabled { background: #2e2040; color: #6a5888; cursor: not-allowed; }

    #stopBtn {
      background: transparent;
      color: #c084fc;
      border: 1px solid #6b3fa0;
      border-radius: 6px;
      padding: 0.6rem 1.1rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      align-self: flex-end;
      display: none;
    }

    #stopBtn:hover { background: #2a1545; }
    #stopBtn:active { transform: scale(0.97); }
    #stopBtn.visible { display: inline-block; }

    .main {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      min-height: 28px;
      font-size: 0.88rem;
      color: #9880c8;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #3a2860;
      border-top-color: #a87fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .badge {
      background: #241848;
      border-radius: 20px;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      color: #c084fc;
    }

    .badge.green { background: #1a2840; color: #7dd3fc; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: linear-gradient(160deg, #1a1232 0%, #150e2a 100%);
      border: 1px solid #3a2860;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #a87fff;
      box-shadow: 0 8px 24px rgba(120, 60, 200, 0.25);
    }

    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: #0d0b18;
    }

    .card-info {
      padding: 0.65rem 0.75rem;
    }

    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: #e8e0ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-artist {
      font-size: 0.78rem;
      color: #9880c8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .card-dims {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.72rem;
      color: #7dd3fc;
      background: #0e1f38;
      border-radius: 4px;
      padding: 1px 6px;
    }

    .placeholder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }

    .placeholder-card {
      background: #1a1232;
      border: 1px solid #3a2860;
      border-radius: 10px;
      overflow: hidden;
    }

    .placeholder-img {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(110deg, #1a1232 8%, #261848 18%, #1a1232 33%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .placeholder-text {
      padding: 0.65rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .placeholder-line {
      height: 10px;
      border-radius: 4px;
      background: linear-gradient(110deg, #261848 8%, #341f60 18%, #261848 33%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      to { background-position: -200% 0; }
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #6a508a;
    }

    .empty-state .big-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .empty-state p { font-size: 0.95rem; }

    .warn-msg {
      background: #1e1a10;
      border: 1px solid #605020;
      border-radius: 8px;
      padding: 0.55rem 1rem;
      color: #d8c880;
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    .error-msg {
      background: #1e1030;
      border: 1px solid #6b2060;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #f0a0d8;
      font-size: 0.88rem;
      margin-bottom: 1rem;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .lightbox.open { display: flex; }

    .lightbox-inner {
      max-width: 700px;
      width: 100%;
      background: linear-gradient(160deg, #1a1232 0%, #150e2a 100%);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #5a3890;
    }

    .lightbox-inner img {
      width: 100%;
      display: block;
    }

    .lightbox-meta {
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .lightbox-meta .title { font-weight: 600; color: #e8e0ff; }
    .lightbox-meta .artist { color: #9880c8; font-size: 0.9rem; }
    .lightbox-close {
      background: #2a1545;
      border: 1px solid #6b3fa0;
      color: #c084fc;
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      font-size: 0.88rem;
    }

    .lightbox-close:hover { background: #3a1f5a; }

    @media (max-width: 600px) {
      .search-panel, .main { padding: 1rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.75rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="vinyl-icon"></div>
  <div>
    <h1>CoverCrate</h1>
    <div class="subtitle">MusicBrainz · Cover Art Archive · iTunes · Deezer</div>
  </div>
</header>

<div class="search-panel">
  <form class="search-row" id="searchForm">
    <div class="field field-query">
      <label for="queryInput">Artist or Album</label>
      <input type="text" id="queryInput" placeholder="e.g. Radiohead, Abbey Road, Daft Punk…" autocomplete="off" required>
    </div>
    <div class="field field-size">
      <label for="minSizeInput">Min size (px)</label>
      <input type="number" id="minSizeInput" value="500" min="1" max="99999" step="1">
    </div>
    <button type="submit" id="searchBtn">Search</button>
    <button type="button" id="stopBtn">Stop</button>
    <div class="source-toggles" style="width:100%">
      <label class="source-toggle"><input type="checkbox" id="srcMusicBrainz" checked> MusicBrainz</label>
      <label class="source-toggle"><input type="checkbox" id="srcItunes" checked> iTunes</label>
      <label class="source-toggle"><input type="checkbox" id="srcDeezer" checked> Deezer</label>
    </div>
  </form>
</div>

<div class="main">
  <div class="status-bar" id="statusBar"></div>
  <div id="errorContainer"></div>
  <div id="results"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-inner" id="lightboxInner">
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-meta">
      <div>
        <div class="title" id="lightboxTitle"></div>
        <div class="artist" id="lightboxArtist"></div>
      </div>
      <button class="lightbox-close" id="lightboxClose">Close</button>
    </div>
  </div>
</div>

<script>
  const MB_BASE = 'https://musicbrainz.org/ws/2';
  const CAA_BASE = 'https://coverartarchive.org';
  const ITUNES_BASE = 'https://itunes.apple.com';
  const DEEZER_BASE = 'https://api.deezer.com';
  const MB_LIMIT = 50;
  const CONCURRENCY = 4;
  const MB_DELAY_MS = 1100; // MusicBrainz rate limit: 1 req/sec

  // ---- State ----
  let searchId = 0;
  let foundCount = 0;
  let checkedCount = 0;
  let totalCount = 0;

  // ---- Elements ----
  const form = document.getElementById('searchForm');
  const queryInput = document.getElementById('queryInput');
  const minSizeInput = document.getElementById('minSizeInput');
  const searchBtn = document.getElementById('searchBtn');
  const stopBtn = document.getElementById('stopBtn');
  const statusBar = document.getElementById('statusBar');
  const errorContainer = document.getElementById('errorContainer');
  const resultsEl = document.getElementById('results');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxTitle = document.getElementById('lightboxTitle');
  const lightboxArtist = document.getElementById('lightboxArtist');
  const lightboxClose = document.getElementById('lightboxClose');
  const srcMusicBrainz = document.getElementById('srcMusicBrainz');
  const srcItunes = document.getElementById('srcItunes');
  const srcDeezer = document.getElementById('srcDeezer');

  // ---- Helpers ----
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function fetchJSON(url) {
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw Object.assign(new Error(`HTTP ${res.status}`), { status: res.status });
    return res.json();
  }

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function getImageDimensions(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve({ width: img.naturalWidth, height: img.naturalHeight });
      img.onerror = () => reject(new Error('image load failed'));
      img.src = url;
    });
  }

  function artistName(release) {
    if (!release['artist-credit'] || !release['artist-credit'].length) return 'Unknown Artist';
    return release['artist-credit'].map(c => (c.name || (c.artist && c.artist.name) || '')).join('');
  }

  // ---- MusicBrainz search ----
  async function searchMusicBrainz(query) {
    const encoded = encodeURIComponent(query);
    const url = `${MB_BASE}/release?query=${encoded}&fmt=json&limit=${MB_LIMIT}`;
    const data = await fetchJSON(url);
    return data.releases || [];
  }

  // ---- Cover Art Archive ----
  async function getFrontCoverURL(mbid) {
    const url = `${CAA_BASE}/release/${mbid}`;
    const data = await fetchJSON(url);
    const front = (data.images || []).find(i => i.front);
    if (!front) return null;
    return front.image || (front.thumbnails && (front.thumbnails.original || front.thumbnails['1200'] || front.thumbnails['500'])) || null;
  }

  // ---- JSONP helper (bypasses CORS) ----
  let jsonpCounter = 0;
  function fetchJSONP(url) {
    return new Promise((resolve, reject) => {
      const callbackName = '_jsonp_cb_' + (++jsonpCounter) + '_' + Date.now();
      const timeout = setTimeout(() => { cleanup(); reject(new Error('JSONP timeout')); }, 15000);
      function cleanup() {
        clearTimeout(timeout);
        delete window[callbackName];
        script.remove();
      }
      window[callbackName] = data => { cleanup(); resolve(data); };
      const sep = url.includes('?') ? '&' : '?';
      const script = document.createElement('script');
      script.src = url + sep + 'callback=' + callbackName;
      script.onerror = () => { cleanup(); reject(new Error('JSONP load failed')); };
      document.head.appendChild(script);
    });
  }

  // ---- iTunes Search (try fetch first, fall back to JSONP) ----
  function parseItunesResults(data) {
    return (data.results || []).map(item => ({
      title: item.collectionName || 'Unknown Album',
      artist: item.artistName || 'Unknown Artist',
      imgUrl: (item.artworkUrl100 || '').replace('100x100bb', '1200x1200bb'),
      source: 'itunes'
    })).filter(r => r.imgUrl);
  }

  async function searchItunes(query) {
    const encoded = encodeURIComponent(query);
    const url = `${ITUNES_BASE}/search?term=${encoded}&entity=album&media=music&country=US&limit=50`;
    // Try plain fetch first (works when CORS is allowed)
    try {
      const res = await fetch(url);
      if (res.ok) return parseItunesResults(await res.json());
    } catch (e) { /* CORS blocked, try JSONP */ }
    // Fall back to JSONP (works when Apple serves callback-wrapped response)
    return parseItunesResults(await fetchJSONP(url));
  }

  // ---- Deezer Search ----
  async function searchDeezer(query) {
    const encoded = encodeURIComponent(query);
    const url = `${DEEZER_BASE}/search/album?q=${encoded}&limit=50&output=jsonp`;
    const data = await fetchJSONP(url);
    return (data.data || []).map(item => ({
      title: item.title || 'Unknown Album',
      artist: (item.artist && item.artist.name) || 'Unknown Artist',
      imgUrl: (item.cover_xl || item.cover_big || ''),
      source: 'deezer'
    })).filter(r => r.imgUrl);
  }

  // ---- UI ----
  function setStatus(html, showSpinner = false) {
    statusBar.innerHTML = showSpinner
      ? `<div class="spinner"></div> ${html}`
      : html;
  }

  function showError(msg) {
    errorContainer.innerHTML = `<div class="error-msg">${escapeHTML(msg)}</div>`;
  }

  function clearError() {
    errorContainer.innerHTML = '';
  }

  function sourceBadge(source) {
    const labels = { musicbrainz: 'MusicBrainz', itunes: 'iTunes', deezer: 'Deezer' };
    return `<span class="card-source src-${source}">${labels[source] || source}</span>`;
  }

  function appendCard(title, artist, imgUrl, dims, source) {
    const card = document.createElement('div');
    card.className = 'card';
    const safeTitle = escapeHTML(title);
    const safeArtist = escapeHTML(artist);
    card.innerHTML = `
      <img src="${imgUrl}" alt="${safeTitle}" loading="lazy">
      <div class="card-info">
        <div class="card-title" title="${safeTitle}">${safeTitle}</div>
        <div class="card-artist" title="${safeArtist}">${safeArtist}</div>
        <span class="card-dims">${dims.width} × ${dims.height}</span>
        ${sourceBadge(source)}
      </div>
    `;
    card.addEventListener('click', () => openLightbox(imgUrl, title, artist));
    document.getElementById('grid')?.appendChild(card);
    foundCount++;
  }

  function showPlaceholders(n) {
    const grid = document.createElement('div');
    grid.className = 'placeholder-grid';
    grid.id = 'placeholderGrid';
    for (let i = 0; i < n; i++) {
      grid.innerHTML += `
        <div class="placeholder-card">
          <div class="placeholder-img"></div>
          <div class="placeholder-text">
            <div class="placeholder-line" style="width:80%"></div>
            <div class="placeholder-line" style="width:55%"></div>
          </div>
        </div>`;
    }
    resultsEl.appendChild(grid);
  }

  function removePlaceholders() {
    document.getElementById('placeholderGrid')?.remove();
  }

  function openLightbox(url, title, artist) {
    lightboxImg.src = url;
    lightboxTitle.textContent = title;
    lightboxArtist.textContent = artist;
    lightbox.classList.add('open');
  }

  lightboxClose.addEventListener('click', () => lightbox.classList.remove('open'));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

  // ---- Main search flow ----
  function setSearching(active) {
    searchBtn.disabled = active;
    stopBtn.classList.toggle('visible', active);
  }

  function updateProgress(minSize, done) {
    setStatus(
      `Checked ${checkedCount}/${totalCount} — ` +
      `<span class="badge green">${foundCount} match${foundCount !== 1 ? 'es' : ''}</span> ≥ ${minSize}px`,
      !done
    );
  }

  async function runSearch(query, minSize, sid) {
    setSearching(true);
    clearError();
    resultsEl.innerHTML = '';
    foundCount = 0;
    checkedCount = 0;
    totalCount = 0;

    const useMB = srcMusicBrainz.checked;
    const useItunes = srcItunes.checked;
    const useDeezer = srcDeezer.checked;

    if (!useMB && !useItunes && !useDeezer) {
      showError('Please enable at least one source.');
      setSearching(false);
      return;
    }

    const enabledNames = [];
    if (useMB) enabledNames.push('MusicBrainz');
    if (useItunes) enabledNames.push('iTunes');
    if (useDeezer) enabledNames.push('Deezer');
    setStatus(`Searching ${enabledNames.join(', ')}…`, true);
    showPlaceholders(8);

    // Create results grid early
    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.id = 'grid';

    // Collect items from all sources in parallel
    const errors = [];
    const sourcePromises = [];

    // --- MusicBrainz source ---
    if (useMB) {
      sourcePromises.push(
        searchMusicBrainz(query)
          .then(releases => releases.map(r => ({
            title: r.title || 'Unknown Album',
            artist: artistName(r),
            mbid: r.id,
            source: 'musicbrainz'
          })))
          .catch(e => { errors.push(`MusicBrainz: ${e.message}`); return []; })
      );
    }

    // --- iTunes source ---
    if (useItunes) {
      sourcePromises.push(
        searchItunes(query)
          .catch(e => { errors.push(`iTunes: ${e.message}`); return []; })
      );
    }

    // --- Deezer source ---
    if (useDeezer) {
      sourcePromises.push(
        searchDeezer(query)
          .catch(e => { errors.push(`Deezer: ${e.message}`); return []; })
      );
    }

    const allResults = await Promise.all(sourcePromises);
    if (sid !== searchId) return;

    removePlaceholders();

    const items = allResults.flat();

    if (errors.length) {
      if (items.length) {
        // Some sources worked — show a subtle warning, not a blocking error
        errorContainer.innerHTML = `<div class="warn-msg">Some sources unavailable: ${escapeHTML(errors.join(' · '))}</div>`;
      } else {
        showError(errors.join(' · '));
      }
    }

    if (!items.length) {
      setStatus('');
      resultsEl.innerHTML = `<div class="empty-state"><div class="big-icon">🎵</div><p>No releases found for "<strong>${escapeHTML(query)}</strong>"</p></div>`;
      setSearching(false);
      return;
    }

    totalCount = items.length;
    setStatus(`Found <strong>${totalCount}</strong> results — checking cover art…`, true);
    resultsEl.appendChild(grid);

    // Process a single item: resolve image URL and check dimensions
    async function processItem(item) {
      if (sid !== searchId) return;
      try {
        let imgUrl = item.imgUrl;

        // MusicBrainz items need a CAA lookup for the image URL
        if (item.source === 'musicbrainz') {
          imgUrl = await getFrontCoverURL(item.mbid);
          if (!imgUrl || sid !== searchId) return;
        }

        const dims = await getImageDimensions(imgUrl);
        if (sid !== searchId) return;

        if (dims.width >= minSize && dims.height >= minSize) {
          appendCard(item.title, item.artist, imgUrl, dims, item.source);
        }
      } catch (e) {
        // no cover art or load error — skip
      } finally {
        if (sid === searchId) {
          checkedCount++;
          updateProgress(minSize, checkedCount >= totalCount);
        }
      }
    }

    // Separate MusicBrainz items (need rate-limited batching) from others
    const mbItems = items.filter(i => i.source === 'musicbrainz');
    const otherItems = items.filter(i => i.source !== 'musicbrainz');

    // Process non-MusicBrainz items quickly in parallel (no rate limit needed)
    const otherPromise = (async () => {
      for (let i = 0; i < otherItems.length; i += 8) {
        if (sid !== searchId) return;
        const batch = otherItems.slice(i, i + 8);
        await Promise.all(batch.map(item => processItem(item)));
      }
    })();

    // Process MusicBrainz items with rate-limited concurrency
    const mbPromise = (async () => {
      for (let i = 0; i < mbItems.length; i += CONCURRENCY) {
        if (sid !== searchId) return;
        const batch = mbItems.slice(i, i + CONCURRENCY);
        await Promise.all(batch.map(item => processItem(item)));
        if (i + CONCURRENCY < mbItems.length) await sleep(MB_DELAY_MS);
      }
    })();

    await Promise.all([otherPromise, mbPromise]);

    if (sid !== searchId) return;
    setSearching(false);

    if (foundCount === 0) {
      grid.remove();
      resultsEl.innerHTML = `<div class="empty-state"><div class="big-icon">🔍</div><p>No covers ≥ <strong>${minSize}px</strong> found for "<strong>${escapeHTML(query)}</strong>".<br>Try a lower minimum size.</p></div>`;
      setStatus(`Checked all ${totalCount} results — no covers met the ${minSize}px minimum.`);
    } else {
      setStatus(`Done — showing <span class="badge green">${foundCount} cover${foundCount !== 1 ? 's' : ''}</span> ≥ ${minSize}px out of ${totalCount} results checked.`);
    }
  }

  form.addEventListener('submit', e => {
    e.preventDefault();
    const query = queryInput.value.trim();
    const minSize = Math.max(1, parseInt(minSizeInput.value) || 500);
    minSizeInput.value = minSize;
    searchId++;
    runSearch(query, minSize, searchId);
  });

  stopBtn.addEventListener('click', () => {
    searchId++;
    setSearching(false);
    setStatus(`Stopped — showing <span class="badge green">${foundCount} cover${foundCount !== 1 ? 's' : ''}</span> found so far.`);
  });

  queryInput.focus();
</script>
</body>
</html>
