<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoverCrate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a3a6c 0%, #2a6cb5 100%);
      border-bottom: 1px solid #1a3a6c;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #fff;
    }

    header .subtitle {
      font-size: 0.8rem;
      color: #b0d0f0;
      margin-top: 2px;
    }

    .source-toggles {
      display: flex;
      gap: 0.9rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .source-toggle {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: #1a3a5c;
      cursor: pointer;
      user-select: none;
    }

    .source-toggle input[type="checkbox"] {
      accent-color: #4a9eff;
      cursor: pointer;
    }

    .card-source {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-radius: 4px;
      padding: 1px 6px;
    }

    .card-source.src-musicbrainz { background: #e8f0fa; color: #2a6cb5; }
    .card-source.src-deezer { background: #e8f5ee; color: #2a8c55; }

    .crate-icon {
      width: 38px;
      height: 32px;
      background: linear-gradient(180deg, #c8904a 0%, #a06830 100%);
      border: 2px solid #8a5520;
      border-radius: 3px;
      position: relative;
      flex-shrink: 0;
    }

    /* Crate horizontal slats */
    .crate-icon::after {
      content: '';
      position: absolute;
      left: 2px; right: 2px;
      top: 9px;
      height: 2px;
      background: #8a5520;
      box-shadow: 0 8px 0 #8a5520;
    }

    /* Vinyl record poking out of crate */
    .crate-icon::before {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle, #e0e8f0 3px, #2a3a4a 3px, #2a3a4a 5px, #1a2a3a 5px);
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      border: 1.5px solid #0e1820;
    }

    .search-panel {
      background: linear-gradient(180deg, #2a6cb5 0%, #e8f0fa 100%);
      border-bottom: 1px solid #c0d8f0;
      padding: 1.5rem 2rem;
    }

    .search-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: flex-end;
      max-width: 900px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .field label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #e0eeff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field input {
      background: #fff;
      border: 1px solid #b0c8e0;
      border-radius: 6px;
      padding: 0.55rem 0.85rem;
      color: #333;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: #4a9eff;
    }

    .field-query { flex: 1; min-width: 240px; }
    .field-query input { width: 100%; }

    .field-size input { width: 110px; }

    button[type="submit"] {
      background: linear-gradient(135deg, #1a5aa0, #2a7cd4);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.4rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      align-self: flex-end;
    }

    button[type="submit"]:hover { opacity: 0.85; }
    button[type="submit"]:active { transform: scale(0.97); }
    button[type="submit"]:disabled { background: #c0d0e0; color: #8a9ab0; cursor: not-allowed; }

    #stopBtn {
      background: transparent;
      color: #2a6cb5;
      border: 1px solid #2a6cb5;
      border-radius: 6px;
      padding: 0.6rem 1.1rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      align-self: flex-end;
      display: none;
    }

    #stopBtn:hover { background: rgba(42, 108, 181, 0.1); }
    #stopBtn:active { transform: scale(0.97); }
    #stopBtn.visible { display: inline-block; }

    .main {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      min-height: 28px;
      font-size: 0.88rem;
      color: #6a8aaa;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #c0d8f0;
      border-top-color: #2a6cb5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .badge {
      background: #e8f0fa;
      border-radius: 20px;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      color: #2a6cb5;
    }

    .badge.green { background: #e0f4f8; color: #1a7a8a; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }

    .card {
      position: relative;
      background: #fff;
      border: 1px solid #d8e4f0;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: radial-gradient(
        300px circle at var(--mouse-x, -999px) var(--mouse-y, -999px),
        rgba(74, 158, 255, 0.5),
        transparent 60%
      );
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .grid:hover .card::before {
      opacity: 1;
    }

    .card > * {
      position: relative;
      z-index: 2;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(42, 108, 181, 0.15);
    }

    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: #f0f4f8;
    }

    .card-info {
      padding: 0.65rem 0.75rem;
    }

    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: #1a2a3a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-artist {
      font-size: 0.78rem;
      color: #6a8aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .card-dims {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.72rem;
      color: #2a7cd4;
      background: #e8f0fa;
      border-radius: 4px;
      padding: 1px 6px;
    }

    .placeholder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }

    .placeholder-card {
      background: #fff;
      border: 1px solid #d8e4f0;
      border-radius: 10px;
      overflow: hidden;
    }

    .placeholder-img {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(110deg, #f0f4f8 8%, #e0e8f0 18%, #f0f4f8 33%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .placeholder-text {
      padding: 0.65rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .placeholder-line {
      height: 10px;
      border-radius: 4px;
      background: linear-gradient(110deg, #e0e8f0 8%, #d0d8e8 18%, #e0e8f0 33%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      to { background-position: -200% 0; }
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #8aa0b8;
    }

    .empty-state .big-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .empty-state p { font-size: 0.95rem; }

    .error-msg {
      background: #fdf0f0;
      border: 1px solid #e0a0a0;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #a03030;
      font-size: 0.88rem;
      margin-bottom: 1rem;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .lightbox.open { display: flex; }

    .lightbox-inner {
      max-width: 700px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #c0d0e0;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .lightbox-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #e0e8f0;
      flex-shrink: 0;
    }

    .lightbox-tabs {
      display: flex;
      gap: 0.25rem;
    }

    .lightbox-tab {
      background: transparent;
      border: 1px solid #c0d0e0;
      color: #6a8aaa;
      border-radius: 6px;
      padding: 0.35rem 0.85rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .lightbox-tab:hover { background: #e8f0fa; color: #2a6cb5; }
    .lightbox-tab.active { background: #2a6cb5; border-color: #2a6cb5; color: #fff; }

    .lightbox-actions {
      display: flex;
      gap: 0.4rem;
    }

    .lightbox-btn {
      background: #f0f4f8;
      border: 1px solid #c0d0e0;
      color: #4a6a8a;
      border-radius: 6px;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      transition: background 0.15s;
    }

    .lightbox-btn:hover { background: #e0e8f0; }

    .lightbox-btn.download {
      background: linear-gradient(135deg, #1a5aa0, #2a7cd4);
      border-color: #1a5aa0;
      color: #fff;
    }

    .lightbox-btn.download:hover { opacity: 0.85; }

    .lightbox-body {
      overflow-y: auto;
      flex: 1;
    }

    .lightbox-view { display: none; }
    .lightbox-view.active { display: block; }

    /* Cover view */
    .lightbox-cover img {
      width: 100%;
      display: block;
    }

    .lightbox-cover-meta {
      padding: 1rem 1.25rem;
    }

    .lightbox-cover-meta .title { font-weight: 600; color: #1a2a3a; font-size: 1.05rem; }
    .lightbox-cover-meta .artist { color: #6a8aaa; font-size: 0.9rem; margin-top: 2px; }

    /* Details view */
    .lightbox-details {
      display: flex;
      gap: 1.5rem;
      padding: 1.25rem;
    }

    .lightbox-details-thumb {
      width: 180px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
      align-self: flex-start;
    }

    .lightbox-details-thumb img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .lightbox-details-info {
      flex: 1;
      min-width: 0;
    }

    .lightbox-details-info .detail-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a2a3a;
      margin-bottom: 2px;
    }

    .lightbox-details-info .detail-artist {
      font-size: 0.95rem;
      color: #6a8aaa;
      margin-bottom: 1rem;
    }

    .detail-table {
      width: 100%;
      border-collapse: collapse;
    }

    .detail-table tr {
      border-bottom: 1px solid #e8f0f5;
    }

    .detail-table tr:last-child { border-bottom: none; }

    .detail-table td {
      padding: 0.45rem 0;
      font-size: 0.85rem;
      vertical-align: top;
    }

    .detail-table td:first-child {
      color: #8aa0b8;
      font-weight: 600;
      white-space: nowrap;
      padding-right: 1rem;
      width: 1%;
    }

    .detail-table td:last-child {
      color: #333;
    }

    @media (max-width: 600px) {
      .search-panel, .main { padding: 1rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.75rem; }
      .lightbox { padding: 0.75rem; }
      .lightbox-details { flex-direction: column; gap: 1rem; }
      .lightbox-details-thumb { width: 120px; }
    }
  </style>
</head>
<body>

<header>
  <div class="crate-icon"></div>
  <div>
    <h1>CoverCrate</h1>
    <div class="subtitle">album cover search engine</div>
  </div>
</header>

<div class="search-panel">
  <form class="search-row" id="searchForm">
    <div class="field field-query">
      <label for="queryInput">Artist or Album</label>
      <input type="text" id="queryInput" placeholder="e.g. Radiohead, Abbey Road, Daft Punk…" autocomplete="off" required>
    </div>
    <div class="field field-size">
      <label for="minSizeInput">Min size (px)</label>
      <input type="number" id="minSizeInput" value="500" min="1" max="99999" step="1">
    </div>
    <button type="submit" id="searchBtn">Search</button>
    <button type="button" id="stopBtn">Stop</button>
    <div class="source-toggles" style="width:100%">
      <label class="source-toggle"><input type="checkbox" id="srcMusicBrainz" checked> MusicBrainz</label>
      <label class="source-toggle"><input type="checkbox" id="srcDeezer" checked> Deezer</label>
    </div>
  </form>
</div>

<div class="main">
  <div class="status-bar" id="statusBar"></div>
  <div id="errorContainer"></div>
  <div id="results"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-inner" id="lightboxInner">
    <div class="lightbox-toolbar">
      <div class="lightbox-tabs">
        <button class="lightbox-tab active" data-view="cover">Cover</button>
        <button class="lightbox-tab" data-view="details">Details</button>
      </div>
      <div class="lightbox-actions">
        <button class="lightbox-btn download" id="lightboxDownload">Download</button>
        <button class="lightbox-btn" id="lightboxClose">Close</button>
      </div>
    </div>
    <div class="lightbox-body">
      <div class="lightbox-view lightbox-cover active" id="viewCover">
        <img id="lightboxImg" src="" alt="">
        <div class="lightbox-cover-meta">
          <div class="title" id="lightboxTitle"></div>
          <div class="artist" id="lightboxArtist"></div>
        </div>
      </div>
      <div class="lightbox-view" id="viewDetails">
        <div class="lightbox-details">
          <div class="lightbox-details-thumb">
            <img id="lightboxThumb" src="" alt="">
          </div>
          <div class="lightbox-details-info">
            <div class="detail-title" id="detailTitle"></div>
            <div class="detail-artist" id="detailArtist"></div>
            <table class="detail-table">
              <tbody id="detailTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const MB_BASE = 'https://musicbrainz.org/ws/2';
  const CAA_BASE = 'https://coverartarchive.org';
  const DEEZER_BASE = 'https://api.deezer.com';
  const MB_LIMIT = 50;
  const CONCURRENCY = 4;
  const MB_DELAY_MS = 1100; // MusicBrainz rate limit: 1 req/sec

  // ---- State ----
  let searchId = 0;
  let foundCount = 0;
  let checkedCount = 0;
  let totalCount = 0;

  // ---- Elements ----
  const form = document.getElementById('searchForm');
  const queryInput = document.getElementById('queryInput');
  const minSizeInput = document.getElementById('minSizeInput');
  const searchBtn = document.getElementById('searchBtn');
  const stopBtn = document.getElementById('stopBtn');
  const statusBar = document.getElementById('statusBar');
  const errorContainer = document.getElementById('errorContainer');
  const resultsEl = document.getElementById('results');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxThumb = document.getElementById('lightboxThumb');
  const lightboxTitle = document.getElementById('lightboxTitle');
  const lightboxArtist = document.getElementById('lightboxArtist');
  const lightboxClose = document.getElementById('lightboxClose');
  const lightboxDownload = document.getElementById('lightboxDownload');
  const detailTitle = document.getElementById('detailTitle');
  const detailArtist = document.getElementById('detailArtist');
  const detailTableBody = document.getElementById('detailTableBody');
  const viewCover = document.getElementById('viewCover');
  const viewDetails = document.getElementById('viewDetails');
  const lightboxTabs = document.querySelectorAll('.lightbox-tab');
  const srcMusicBrainz = document.getElementById('srcMusicBrainz');
  const srcDeezer = document.getElementById('srcDeezer');

  // ---- Helpers ----
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function fetchJSON(url) {
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw Object.assign(new Error(`HTTP ${res.status}`), { status: res.status });
    return res.json();
  }

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function getImageDimensions(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve({ width: img.naturalWidth, height: img.naturalHeight });
      img.onerror = () => reject(new Error('image load failed'));
      img.src = url;
    });
  }

  function artistName(release) {
    if (!release['artist-credit'] || !release['artist-credit'].length) return 'Unknown Artist';
    return release['artist-credit'].map(c => (c.name || (c.artist && c.artist.name) || '')).join('');
  }

  // ---- MusicBrainz search ----
  async function searchMusicBrainz(query) {
    const encoded = encodeURIComponent(query);
    const url = `${MB_BASE}/release?query=${encoded}&fmt=json&limit=${MB_LIMIT}`;
    const data = await fetchJSON(url);
    return data.releases || [];
  }

  // ---- Cover Art Archive ----
  async function getFrontCoverURL(mbid) {
    const url = `${CAA_BASE}/release/${mbid}`;
    const data = await fetchJSON(url);
    const front = (data.images || []).find(i => i.front);
    if (!front) return null;
    return front.image || (front.thumbnails && (front.thumbnails.original || front.thumbnails['1200'] || front.thumbnails['500'])) || null;
  }

  // ---- JSONP helper (bypasses CORS) ----
  let jsonpCounter = 0;
  function fetchJSONP(url) {
    return new Promise((resolve, reject) => {
      const callbackName = '_jsonp_cb_' + (++jsonpCounter) + '_' + Date.now();
      const timeout = setTimeout(() => { cleanup(); reject(new Error('JSONP timeout')); }, 15000);
      function cleanup() {
        clearTimeout(timeout);
        delete window[callbackName];
        script.remove();
      }
      window[callbackName] = data => { cleanup(); resolve(data); };
      const sep = url.includes('?') ? '&' : '?';
      const script = document.createElement('script');
      script.src = url + sep + 'callback=' + callbackName;
      script.onerror = () => { cleanup(); reject(new Error('JSONP load failed')); };
      document.head.appendChild(script);
    });
  }

  // ---- Deezer Search ----
  async function searchDeezer(query) {
    const encoded = encodeURIComponent(query);
    const url = `${DEEZER_BASE}/search/album?q=${encoded}&limit=50&output=jsonp`;
    const data = await fetchJSONP(url);
    return (data.data || []).map(item => ({
      title: item.title || 'Unknown Album',
      artist: (item.artist && item.artist.name) || 'Unknown Artist',
      imgUrl: (item.cover_xl || item.cover_big || ''),
      source: 'deezer',
      meta: {
        tracks: item.nb_tracks || null,
        type: item.record_type || null,
        explicit: item.explicit_lyrics || false,
      }
    })).filter(r => r.imgUrl);
  }

  // ---- UI ----
  function setStatus(html, showSpinner = false) {
    statusBar.innerHTML = showSpinner
      ? `<div class="spinner"></div> ${html}`
      : html;
  }

  function showError(msg) {
    errorContainer.innerHTML = `<div class="error-msg">${escapeHTML(msg)}</div>`;
  }

  function clearError() {
    errorContainer.innerHTML = '';
  }

  function sourceBadge(source) {
    const labels = { musicbrainz: 'MusicBrainz', deezer: 'Deezer' };
    return `<span class="card-source src-${source}">${labels[source] || source}</span>`;
  }

  function appendCard(item, imgUrl, dims) {
    const card = document.createElement('div');
    card.className = 'card';
    const safeTitle = escapeHTML(item.title);
    const safeArtist = escapeHTML(item.artist);
    card.innerHTML = `
      <img src="${imgUrl}" alt="${safeTitle}" loading="lazy">
      <div class="card-info">
        <div class="card-title" title="${safeTitle}">${safeTitle}</div>
        <div class="card-artist" title="${safeArtist}">${safeArtist}</div>
        <span class="card-dims">${dims.width} × ${dims.height}</span>
        ${sourceBadge(item.source)}
      </div>
    `;
    const cardData = { ...item, imgUrl, dims };
    card.addEventListener('click', () => openLightbox(cardData));
    document.getElementById('grid')?.appendChild(card);
    foundCount++;
  }

  function showPlaceholders(n) {
    const grid = document.createElement('div');
    grid.className = 'placeholder-grid';
    grid.id = 'placeholderGrid';
    for (let i = 0; i < n; i++) {
      grid.innerHTML += `
        <div class="placeholder-card">
          <div class="placeholder-img"></div>
          <div class="placeholder-text">
            <div class="placeholder-line" style="width:80%"></div>
            <div class="placeholder-line" style="width:55%"></div>
          </div>
        </div>`;
    }
    resultsEl.appendChild(grid);
  }

  function removePlaceholders() {
    document.getElementById('placeholderGrid')?.remove();
  }

  function switchLightboxView(viewName) {
    lightboxTabs.forEach(t => t.classList.toggle('active', t.dataset.view === viewName));
    viewCover.classList.toggle('active', viewName === 'cover');
    viewDetails.classList.toggle('active', viewName === 'details');
  }

  function buildDetailRows(data) {
    const rows = [];
    const meta = data.meta || {};
    const src = data.source;
    const sourceLabels = { musicbrainz: 'MusicBrainz', deezer: 'Deezer' };

    if (meta.date) rows.push(['Release Date', escapeHTML(meta.date)]);
    if (meta.tracks) rows.push(['Tracks', meta.tracks]);
    if (meta.country) rows.push(['Country', escapeHTML(meta.country)]);
    if (meta.label) rows.push(['Label', escapeHTML(meta.label)]);
    if (meta.status) rows.push(['Status', escapeHTML(meta.status)]);
    if (meta.packaging) rows.push(['Packaging', escapeHTML(meta.packaging)]);
    if (meta.barcode) rows.push(['Barcode', escapeHTML(meta.barcode)]);
    if (meta.disambiguation) rows.push(['Note', escapeHTML(meta.disambiguation)]);
    if (meta.type) rows.push(['Type', escapeHTML(meta.type.charAt(0).toUpperCase() + meta.type.slice(1))]);
    if (meta.explicit) rows.push(['Explicit', 'Yes']);
    if (data.dims) rows.push(['Image Size', `${data.dims.width} × ${data.dims.height} px`]);
    rows.push(['Source', sourceLabels[src] || src]);

    return rows;
  }

  let currentLightboxData = null;

  function openLightbox(data) {
    currentLightboxData = data;
    lightboxImg.src = data.imgUrl;
    lightboxThumb.src = data.imgUrl;
    lightboxTitle.textContent = data.title;
    lightboxArtist.textContent = data.artist;
    detailTitle.textContent = data.title;
    detailArtist.textContent = data.artist;

    const rows = buildDetailRows(data);
    detailTableBody.innerHTML = rows.map(([k, v]) =>
      `<tr><td>${k}</td><td>${v}</td></tr>`
    ).join('');

    switchLightboxView('cover');
    lightbox.classList.add('open');
  }

  async function downloadCurrentImage() {
    if (!currentLightboxData) return;
    const btn = lightboxDownload;
    const origText = btn.textContent;
    btn.textContent = 'Downloading…';
    btn.disabled = true;
    try {
      const res = await fetch(currentLightboxData.imgUrl);
      const blob = await res.blob();
      const ext = blob.type.includes('png') ? 'png' : 'jpg';
      const safeName = (currentLightboxData.artist + ' - ' + currentLightboxData.title)
        .replace(/[^a-zA-Z0-9 _\-]/g, '').trim() || 'album-cover';
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${safeName}.${ext}`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
    } catch (e) {
      // Fallback: open in new tab if fetch/blob fails (CORS)
      window.open(currentLightboxData.imgUrl, '_blank');
    } finally {
      btn.textContent = origText;
      btn.disabled = false;
    }
  }

  lightboxDownload.addEventListener('click', downloadCurrentImage);

  lightboxTabs.forEach(tab => {
    tab.addEventListener('click', () => switchLightboxView(tab.dataset.view));
  });

  lightboxClose.addEventListener('click', () => lightbox.classList.remove('open'));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

  // ---- Main search flow ----
  function setSearching(active) {
    searchBtn.disabled = active;
    stopBtn.classList.toggle('visible', active);
  }

  function updateProgress(minSize, done) {
    setStatus(
      `Checked ${checkedCount}/${totalCount} — ` +
      `<span class="badge green">${foundCount} match${foundCount !== 1 ? 'es' : ''}</span> ≥ ${minSize}px`,
      !done
    );
  }

  async function runSearch(query, minSize, sid) {
    setSearching(true);
    clearError();
    resultsEl.innerHTML = '';
    foundCount = 0;
    checkedCount = 0;
    totalCount = 0;

    const useMB = srcMusicBrainz.checked;
    const useDeezer = srcDeezer.checked;

    if (!useMB && !useDeezer) {
      showError('Please enable at least one source.');
      setSearching(false);
      return;
    }

    const enabledNames = [];
    if (useMB) enabledNames.push('MusicBrainz');
    if (useDeezer) enabledNames.push('Deezer');
    setStatus(`Searching ${enabledNames.join(', ')}…`, true);
    showPlaceholders(8);

    // Create results grid early
    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.id = 'grid';

    // Collect items from all sources in parallel
    const errors = [];
    const sourcePromises = [];

    // --- MusicBrainz source ---
    if (useMB) {
      sourcePromises.push(
        searchMusicBrainz(query)
          .then(releases => releases.map(r => ({
            title: r.title || 'Unknown Album',
            artist: artistName(r),
            mbid: r.id,
            source: 'musicbrainz',
            meta: {
              date: r.date || null,
              country: r.country || null,
              status: r.status || null,
              barcode: r.barcode || null,
              tracks: r['track-count'] || null,
              label: (r['label-info'] && r['label-info'][0] && r['label-info'][0].label && r['label-info'][0].label.name) || null,
              packaging: r.packaging || null,
              disambiguation: r.disambiguation || null,
            }
          })))
          .catch(e => { errors.push(`MusicBrainz: ${e.message}`); return []; })
      );
    }

    // --- Deezer source ---
    if (useDeezer) {
      sourcePromises.push(
        searchDeezer(query)
          .catch(e => { errors.push(`Deezer: ${e.message}`); return []; })
      );
    }

    const allResults = await Promise.all(sourcePromises);
    if (sid !== searchId) return;

    removePlaceholders();

    const items = allResults.flat();

    if (errors.length) {
      showError(errors.join(' · '));
    }

    if (!items.length) {
      setStatus('');
      resultsEl.innerHTML = `<div class="empty-state"><div class="big-icon">🎵</div><p>No releases found for "<strong>${escapeHTML(query)}</strong>"</p></div>`;
      setSearching(false);
      return;
    }

    totalCount = items.length;
    setStatus(`Found <strong>${totalCount}</strong> results — checking cover art…`, true);
    resultsEl.appendChild(grid);

    // Process a single item: resolve image URL and check dimensions
    async function processItem(item) {
      if (sid !== searchId) return;
      try {
        let imgUrl = item.imgUrl;

        // MusicBrainz items need a CAA lookup for the image URL
        if (item.source === 'musicbrainz') {
          imgUrl = await getFrontCoverURL(item.mbid);
          if (!imgUrl || sid !== searchId) return;
        }

        const dims = await getImageDimensions(imgUrl);
        if (sid !== searchId) return;

        if (dims.width >= minSize && dims.height >= minSize) {
          appendCard(item, imgUrl, dims);
        }
      } catch (e) {
        // no cover art or load error — skip
      } finally {
        if (sid === searchId) {
          checkedCount++;
          updateProgress(minSize, checkedCount >= totalCount);
        }
      }
    }

    // Separate MusicBrainz items (need rate-limited batching) from others
    const mbItems = items.filter(i => i.source === 'musicbrainz');
    const otherItems = items.filter(i => i.source !== 'musicbrainz');

    // Process non-MusicBrainz items quickly in parallel (no rate limit needed)
    const otherPromise = (async () => {
      for (let i = 0; i < otherItems.length; i += 8) {
        if (sid !== searchId) return;
        const batch = otherItems.slice(i, i + 8);
        await Promise.all(batch.map(item => processItem(item)));
      }
    })();

    // Process MusicBrainz items with rate-limited concurrency
    const mbPromise = (async () => {
      for (let i = 0; i < mbItems.length; i += CONCURRENCY) {
        if (sid !== searchId) return;
        const batch = mbItems.slice(i, i + CONCURRENCY);
        await Promise.all(batch.map(item => processItem(item)));
        if (i + CONCURRENCY < mbItems.length) await sleep(MB_DELAY_MS);
      }
    })();

    await Promise.all([otherPromise, mbPromise]);

    if (sid !== searchId) return;
    setSearching(false);

    if (foundCount === 0) {
      grid.remove();
      resultsEl.innerHTML = `<div class="empty-state"><div class="big-icon">🔍</div><p>No covers ≥ <strong>${minSize}px</strong> found for "<strong>${escapeHTML(query)}</strong>".<br>Try a lower minimum size.</p></div>`;
      setStatus(`Checked all ${totalCount} results — no covers met the ${minSize}px minimum.`);
    } else {
      setStatus(`Done — showing <span class="badge green">${foundCount} cover${foundCount !== 1 ? 's' : ''}</span> ≥ ${minSize}px out of ${totalCount} results checked.`);
    }
  }

  form.addEventListener('submit', e => {
    e.preventDefault();
    const query = queryInput.value.trim();
    const minSize = Math.max(1, parseInt(minSizeInput.value) || 500);
    minSizeInput.value = minSize;
    searchId++;
    runSearch(query, minSize, searchId);
  });

  stopBtn.addEventListener('click', () => {
    searchId++;
    setSearching(false);
    setStatus(`Stopped — showing <span class="badge green">${foundCount} cover${foundCount !== 1 ? 's' : ''}</span> found so far.`);
  });

  // ---- Cursor-tracking border glow ----
  resultsEl.addEventListener('mousemove', e => {
    const cards = resultsEl.querySelectorAll('.card');
    for (const card of cards) {
      const rect = card.getBoundingClientRect();
      card.style.setProperty('--mouse-x', (e.clientX - rect.left) + 'px');
      card.style.setProperty('--mouse-y', (e.clientY - rect.top) + 'px');
    }
  });

  queryInput.focus();
</script>
</body>
</html>
